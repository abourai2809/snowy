name: Attendance Selfie AI Checks

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Process queued checks without calling Gemini
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: attendance-selfie-checks
  cancel-in-progress: false

jobs:
  validate-selfies:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: dev-skand

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate queued attendance selfies
        run: npm run worker:attendance-selfies
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ATTENDANCE_SELFIE_MODEL: ${{ vars.ATTENDANCE_SELFIE_MODEL || 'gemini-2.5-flash-lite' }}
          ATTENDANCE_SELFIE_ALERT_WEBHOOK_URL: ${{ secrets.ATTENDANCE_SELFIE_ALERT_WEBHOOK_URL }}
          ATTENDANCE_SELFIE_ALERT_WEBHOOK_KIND: ${{ vars.ATTENDANCE_SELFIE_ALERT_WEBHOOK_KIND || 'slack' }}
          ATTENDANCE_SELFIE_MAX_CHECKS: 25
          ATTENDANCE_SELFIE_DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true' && '1' || '0' }}
