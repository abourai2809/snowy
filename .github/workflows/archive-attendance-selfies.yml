name: Archive Attendance Selfies

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Scan old selfies without uploading to Drive or deleting Supabase files
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  schedule:
    - cron: "30 21 * * *"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: archive-attendance-selfies
  cancel-in-progress: false

jobs:
  archive-selfies:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Archive old attendance selfies
        run: npm run archive:attendance-selfies
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GOOGLE_DRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_DRIVE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_DRIVE_ATTENDANCE_SELFIE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_ATTENDANCE_SELFIE_FOLDER_ID }}
          ATTENDANCE_SELFIE_REVIEW_DAYS: ${{ vars.ATTENDANCE_SELFIE_REVIEW_DAYS || '3' }}
          ATTENDANCE_SELFIE_ARCHIVE_MAX: ${{ vars.ATTENDANCE_SELFIE_ARCHIVE_MAX || '50' }}
          ATTENDANCE_SELFIE_ARCHIVE_DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true' && '1' || '0' }}
