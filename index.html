<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Snowy Owl Gelato Co.</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--pk:#C17B7B;--pkl:#D4A0A0;--pkll:#F5E8E8;--pkd:#8B4A4A;--pkdd:#5C2D2D;
--tl:#7BBFBF;--tld:#4A8F8F;--tldd:#2C5F5F;--tlll:#E1F0F0;
--am:#D4A050;--aml:#F5ECD8;--amd:#8B6020;
--cr:#FFF9F5;--bg:#FEF6F0;--wh:#FFFFFF;
--tx:#3D2020;--tx2:#7A4A4A;--tx3:#B07070;
--bd:rgba(193,123,123,0.2);--bd2:rgba(193,123,123,0.4);
--r:14px;--ff:'Playfair Display',serif;--fb:'Nunito',sans-serif;
}
body{background:var(--bg);color:var(--tx);font-family:var(--fb);font-size:14px;min-height:100vh}
#app{min-height:100vh;display:flex;flex-direction:column}
.ls{min-height:100vh;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem}
.logo-img{width:130px;height:130px;border-radius:50%;object-fit:cover;display:block;margin:0 auto 1.2rem}
.bn{font-family:var(--ff);font-size:1.55rem;color:var(--tx);font-style:italic;text-align:center}
.bsub{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--pk);text-align:center;margin-top:2px;margin-bottom:2rem;font-weight:600}
.card{background:var(--wh);border:1px solid var(--bd);border-radius:var(--r);padding:1.2rem;margin-bottom:.8rem}
.field{margin-bottom:.9rem}
.field label{display:block;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--tx3);margin-bottom:5px;font-weight:700}
.field input,.field select,.field textarea{width:100%;padding:10px 13px;border:1px solid var(--bd2);border-radius:10px;background:var(--cr);font-family:var(--fb);font-size:14px;color:var(--tx);outline:none;transition:border .2s}
.field input:focus,.field select:focus{border-color:var(--pk)}
.bp{width:100%;padding:13px;background:var(--pk);color:white;border:none;border-radius:10px;font-family:var(--fb);font-size:13px;font-weight:700;cursor:pointer}
.bt{padding:9px 16px;background:var(--tl);color:white;border:none;border-radius:10px;font-family:var(--fb);font-size:12px;font-weight:700;cursor:pointer}
.bam{padding:9px 16px;background:var(--am);color:white;border:none;border-radius:10px;font-family:var(--fb);font-size:12px;font-weight:700;cursor:pointer}
.bs2{padding:8px 14px;background:transparent;color:var(--tx2);border:1px solid var(--bd2);border-radius:10px;font-size:12px;cursor:pointer;font-family:var(--fb);font-weight:600}
.bd2c{padding:7px 12px;background:transparent;color:#b03030;border:1px solid rgba(176,48,48,.3);border-radius:8px;font-size:11px;cursor:pointer;font-family:var(--fb)}
.bw{width:100%}
.qb{width:100%;padding:9px 12px;background:var(--pkll);border:1px solid var(--bd);border-radius:9px;font-size:12px;cursor:pointer;color:var(--tx);text-align:left;font-family:var(--fb);margin-bottom:5px;font-weight:500}
.hdr{background:var(--pk);padding:13px 1rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.hli{width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,.3)}
.av{width:32px;height:32px;border-radius:50%;background:var(--pkd);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:white}
.main{flex:1;padding:1rem;padding-bottom:82px}
.bnav{background:var(--wh);border-top:1px solid var(--bd);display:flex;position:fixed;bottom:0;left:0;right:0;z-index:100}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;padding:9px 3px 13px;cursor:pointer;color:var(--tx3);font-size:9px;letter-spacing:.03em;text-transform:uppercase;font-weight:700;gap:3px;background:none;border:none;font-family:var(--fb)}
.ni.act{color:var(--pk)}
.ni-ic{font-size:16px}
.stats{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-bottom:.8rem}
.sc{background:var(--pkll);border:1px solid var(--bd);border-radius:var(--r);padding:.9rem;text-align:center}
.sc.tl{background:var(--tlll);border-color:rgba(123,191,191,.3)}
.sc.am{background:var(--aml);border-color:rgba(212,160,80,.3)}
.sv{font-family:var(--ff);font-size:1.9rem;font-weight:400;color:var(--pkd);line-height:1}
.sc.tl .sv{color:var(--tld)}.sc.am .sv{color:var(--amd)}
.sl{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--tx3);margin-top:3px;font-weight:700}
.al{padding:9px 13px;border-radius:9px;font-size:12px;margin-bottom:7px;display:flex;align-items:flex-start;gap:7px;font-weight:600}
.aw{background:#FFF8E1;border:1px solid #F9A825;color:#7A5800}
.ad{background:#FFEBEE;border:1px solid #EF5350;color:#7A0000}
.as{background:#E8F5E9;border:1px solid #4CAF50;color:#1B5E20}
.ai{background:var(--pkll);border:1px solid var(--bd2);color:var(--pkdd)}
.aa{background:var(--aml);border:1px solid rgba(212,160,80,.5);color:var(--amd)}
.tabs{display:flex;gap:3px;margin-bottom:.9rem;background:var(--pkll);border-radius:10px;padding:3px}
.tab{flex:1;padding:7px 4px;text-align:center;border-radius:8px;cursor:pointer;font-size:11px;font-weight:700;border:none;background:none;color:var(--tx3);font-family:var(--fb)}
.tab.act{background:white;color:var(--pkd)}
.ct{font-family:var(--ff);font-size:1.05rem;color:var(--tx);margin-bottom:.7rem;font-style:italic}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:.9rem}
.stt{font-family:var(--ff);font-size:1.5rem;font-weight:400;color:var(--tx);font-style:italic}
.prog{height:5px;background:var(--pkll);border-radius:3px;overflow:hidden;margin-top:3px}
.pf{height:100%;border-radius:3px}
.r2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-bottom:8px}
.badge{display:inline-block;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.bg2{background:#E8F5E9;color:#2E7D32}.br2{background:#FFEBEE;color:#C62828}
.bo{background:#FFF8E1;color:#7A5800}.bb{background:#E3F2FD;color:#1565C0}
.bm{background:var(--pkll);color:var(--pkdd)}.bpk{background:var(--pk);color:white}
.btl2{background:var(--tl);color:white}.bam2{background:var(--am);color:white}
.pfp{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;background:var(--pk);color:white}
.pup{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;background:var(--pkll);color:var(--pkd);border:1px solid var(--bd2)}
.nb{background:var(--pkd);color:white;padding:10px 20px;border-radius:20px;font-size:13px;text-align:center;margin-bottom:12px;font-weight:600}
.rt{font-size:10px;padding:2px 7px;border-radius:10px;background:var(--pkll);color:var(--pkdd);font-weight:700}
.tm{color:var(--tx3);font-size:12px}
.fbc{display:flex;align-items:center;justify-content:space-between}
.flex{display:flex}.gap2{gap:8px}.wf{width:100%}
.mt{margin-top:8px}.mb{margin-bottom:8px}
.evc{background:var(--wh);border:1px solid rgba(212,160,80,.4);border-radius:var(--r);padding:1.1rem;margin-bottom:.8rem;border-left:4px solid var(--am)}
.evs-active{border-left-color:var(--tl)}.evs-completed{border-left-color:#4CAF50}.evs-cancelled{border-left-color:#EF5350}
.drow{background:var(--tlll);border:1px solid rgba(123,191,191,.4);border-radius:10px;padding:10px;margin-bottom:6px}
.rrow{background:var(--pkll);border:1px solid var(--bd);border-radius:10px;padding:10px;margin-bottom:6px}
.stag{display:inline-block;background:var(--tl);color:white;font-size:9px;padding:1px 5px;border-radius:10px;margin-left:4px;font-weight:700}
.dot{width:6px;height:6px;background:var(--pk);border-radius:50%;animation:pulse 1.4s infinite;display:inline-block}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,80%,100%{transform:scale(.8);opacity:.5}40%{transform:scale(1);opacity:1}}
.shift-done{background:#E8F5E9;border:1px solid #4CAF50;border-radius:10px;padding:14px;text-align:center;color:#1B5E20;font-weight:700;font-size:14px}
.shift-inc{background:#FFEBEE;border:1px solid #EF5350;border-radius:10px;padding:14px;text-align:center;color:#7A0000;font-weight:700;font-size:14px}
.shift-half{background:#F3E8FF;border:1px solid #9C27B0;border-radius:10px;padding:14px;text-align:center;color:#4A0072;font-weight:700;font-size:14px}
.batch-card{background:var(--pkll);border:1px solid var(--bd2);border-radius:11px;padding:10px;margin-bottom:8px;position:relative}
.batch-card.teal{background:var(--tlll);border-color:rgba(123,191,191,.5)}
.batch-rm{position:absolute;top:6px;right:8px;background:none;border:none;color:var(--tx3);cursor:pointer;font-size:18px;line-height:1;padding:0 4px;font-family:var(--fb)}
.add-more-btn{width:100%;padding:11px;background:transparent;border:1.5px dashed var(--pkl);border-radius:10px;font-family:var(--fb);font-size:13px;font-weight:700;color:var(--pk);cursor:pointer;margin-bottom:10px}
.disp-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;background:#FFF8E1;color:#7A5800;border:1px solid #F9A825}
.bkup-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;background:var(--tlll);color:var(--tldd);border:1px solid rgba(123,191,191,.5)}
.cam-btn{width:100%;padding:12px;background:var(--tlll);border:1px solid rgba(123,191,191,.5);border-radius:10px;font-family:var(--fb);font-size:13px;font-weight:700;color:var(--tldd);cursor:pointer;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:8px}
.selfie-prev{width:100%;max-height:160px;object-fit:cover;border-radius:10px;margin-bottom:8px;display:block}
.consumed-row{background:var(--aml);border:1px solid rgba(212,160,80,.4);border-radius:10px;padding:10px;margin-bottom:6px}
.req-item-card{background:var(--pkll);border:1px solid var(--bd2);border-radius:10px;padding:10px;margin-bottom:8px;position:relative}
.req-rm{position:absolute;top:8px;right:8px;background:none;border:none;color:var(--tx3);cursor:pointer;font-size:16px;font-family:var(--fb)}
</style>
</head>

function fd(d){return new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'short'});}
function daysOld(d){return Math.floor((Date.now()-new Date(d).getTime())/86400000);}
function ini(n){return n.split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase();}
function rl(r){return({admin:'Admin',store_manager:'Store Manager',lab_manager:'Lab Manager',store_staff:'Store Staff',lab_staff:'Lab Staff'})[r]||r;}
function pL(p){return p==='full'?'Full Pan':'Used Pan';}
function pC(p){return p==='full'?'pfp':'pup';}
function prL(r){return r==='display'?'Display':r==='backup'?'Backup':r==='event'?'Event':r==='store'?'Store':'—';}
function prC(r){return r==='display'?'disp-badge':r==='backup'?'bkup-badge':r==='event'?'bam2':r==='store'?'btl2':'bm';}
function sN(id){return DB.stores.find(s=>s.id===id)?.name||id;}
function evC(s){return s==='active'?'var(--tl)':s==='completed'?'#4CAF50':s==='cancelled'?'#EF5350':'var(--am)';}
function canCreateEvent(r){return r==='admin'||r==='lab_manager'||r==='store_manager';}
function needsSelfie(user){return user.role!=='admin';}
function todayStr(){return new Date().toISOString().split('T')[0];}
function nowStr(){return new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});}
function shiftStatus(hours){if(hours===null||hours===undefined)return null;if(hours>=9)return 'complete';if(hours>=8)return 'half';return 'incomplete';}
function shiftLabel(hours){const s=shiftStatus(hours);if(!s)return '';if(s==='complete')return '&#10003; Shift complete';if(s==='half')return '&#9680; Half day';return '&#9888; Shift incomplete';}
function shiftCls(hours){const s=shiftStatus(hours);if(s==='complete')return 'shift-done';if(s==='half')return 'shift-half';return 'shift-inc';}

}

function rWeeklyOff(){

    ${d.deductDays>0?`<div class="sc" style="background:#FFEBEE;border-color:rgba(239,83,80,.3)"><div class="sv" style="color:#C62828">-${d.deductDays}</div><div class="sl">Days deducted</div></div>`:'<div class="sc tl"><div class="sv">${d.effectiveDays.toFixed(1)}</div><div class="sl">Days worked</div></div>'}

    ${d.bonusDays>0?`<div class="al as mb">+${d.bonusDays} unused off${d.bonusDays!==1?'s':''} bonus · &#8377;${Math.round(d.bonusDays*d.dayRate).toLocaleString('en-IN')} extra</div>`:''}
    ${d.excessOffs>0?`<div class="al ad mb">-${d.excessOffs} excess off${d.excessOffs!==1?'s':''} · &#8377;${Math.round(d.excessOffs*d.dayRate).toLocaleString('en-IN')} deducted</div>`:''}
    ${d.absentDays>0?`<div class="al ad mb">-${d.absentDays} absent day${d.absentDays!==1?'s':''} · &#8377;${Math.round(d.absentDays*d.dayRate).toLocaleString('en-IN')} deducted</div>`:''}

      <div class="tm" style="font-size:11px;margin-bottom:3px">Estimated salary</div>
      <div style="font-family:var(--ff);font-size:2rem;color:var(--pkd)">&#8377;${d.salary.toLocaleString('en-IN')}</div>
    </div>
  </div>

    ${remaining>0?`<div class="al as mb">${remaining} off${remaining!==1?'s':''} remaining this month</div>`:''}

  let storeIds=[];
  if(r==='admin')storeIds=DB.stores.map(s=>s.id);
  else if(isStoreManager)storeIds=DB.stores.map(s=>s.id);
  else{
    const activeStore=S.checkedIn&&S.checkInStore?S.checkInStore:u.store;
    storeIds=activeStore?[activeStore]:[];
  }
  const lt=S.subTab.store||'gelato';
  const ctxId=isStoreManager||r==='admin'?(S.selStore||storeIds[0]):storeIds[0];

  return `<div class="sh"><h2 class="stt">${isStoreManager||r==='admin'?'Stores':store.name}</h2></div>

  <div class="tabs">
    <button class="tab${lt==='gelato'?' act':''}" onclick="sst('store','gelato')">Gelato</button>
    <button class="tab${lt==='incoming'?' act':''}" onclick="sst('store','incoming')">Incoming${DB.pendingDispatch.filter(d=>d.toStore===ctxId).length>0?' ●':''}</button>
    <button class="tab${lt==='received'?' act':''}" onclick="sst('store','received')">Received</button>

function rStoreG(store,canEdit){
  const inv=DB.storeGelato[store.id]||[];
  const tot=inv.reduce((a,i)=>a+(i.weight||0),0);
  const fps=inv.filter(i=>i.pan==='full').length;
  const ups=inv.filter(i=>i.pan==='used').length;
  const evGelato=DB.events.filter(e=>e.status!=='cancelled').flatMap(e=>e.gelato.filter(g=>g.storedAt===store.id).map(g=>({...g,eventName:e.name,eventStatus:e.status})));
  return `
  <div class="stats"><div class="sc"><div class="sv">${tot.toFixed(1)}<span style="font-size:.9rem">kg</span></div><div class="sl">Total gelato</div></div>
  <div class="sc tl"><div class="sv">${inv.length}/${store.capacity}</div><div class="sl">Flavours</div></div></div>
  <div style="display:flex;gap:8px;margin-bottom:.8rem"><span class="pfp">${fps} Full Pan${fps!==1?'s':''}</span><span class="pup">${ups} Used Pan${ups!==1?'s':''}</span></div>
  ${canEdit?`<div class="card"><div class="ct">Add gelato to store</div>
    <div class="field"><label>Flavour</label><select id="sg-fl"><option value="">Select</option>${DB.flavours.map(f=>`<option>${f.name}</option>`).join('')}</select></div>
    <div class="r2">
      <div class="field" style="margin-bottom:0"><label>Pan type</label><select id="sg-pan"><option value="full">Full Pan</option><option value="used">Used Pan</option></select></div>
      <div class="field" style="margin-bottom:0"><label>Weight (kg)</label><input type="number" id="sg-wt" placeholder="0.0" step="0.1" min="0.1" max="3.5"/></div>
    </div>
    <div class="field mt"><label>Mfg date</label><input type="date" id="sg-dt" value="${new Date().toISOString().split('T')[0]}"/></div>
    <button class="bp bw" onclick="addStoreG('${store.id}')">Add to Store</button>
  </div>`:''}
  <div class="card"><div class="ct">Store gelato</div>
    ${inv.length===0?`<p class="tm" style="padding:1.5rem 0;text-align:center">No gelato recorded</p>`:''}
    ${inv.map(item=>{const old=daysOld(item.mfgDate);const isLow=item.weight<1.5;return`<div style="padding:11px 0;border-bottom:1px solid var(--bd)">
      <div class="fbc mb"><div><span style="font-weight:700">${item.flavour}</span>${isLow?`<span class="badge br2" style="margin-left:5px">Low</span>`:''}</div>
        <span style="font-family:var(--ff);font-size:1.1rem;color:${isLow?'#EF5350':'var(--pk)'}">${item.weight?(item.weight.toFixed(1)+'<span style="font-size:.75rem">kg</span>'):'—'}</span></div>
      <div class="fbc"><span class="${pC(item.pan)}">${pL(item.pan)}</span><span class="tm" style="font-size:11px">Made ${fd(item.mfgDate)} · ${old}d old</span></div>
    </div>`;}).join('')}
  </div>
  ${evGelato.length?`<div class="card"><div class="ct">Event gelato at this store</div>
    ${evGelato.map(g=>`<div style="padding:9px 0;border-bottom:1px solid var(--bd)">
      <div class="fbc mb"><span style="font-weight:700;font-size:13px">${g.flavour}</span><span style="font-family:var(--ff);font-size:1rem;color:var(--am)">${g.weight?(g.weight*(g.qty||1)).toFixed(1)+'kg':'TBD'}</span></div>
      <div class="fbc"><span class="${pC(g.pan)}">${pL(g.pan)}</span><span class="badge" style="background:${evC(g.eventStatus)};color:white">${g.eventName.split(' ').slice(0,2).join(' ')}</span></div>
    </div>`).join('')}
  </div>`:''} `;
}

    <div class="field"><label>Flavour</label><select id="rc-fl"><option value="">Select</option>${DB.flavours.map(f=>`<option>${f.name}</option>`).join('')}</select></div>

function rStoreSup(store,canEdit,showStorePicker){
  const ctxId=showStorePicker?(S.supStoreCtx||store.id):store.id;
  const ctxStore=DB.stores.find(s=>s.id===ctxId)||store;
  const sup=DB.storeSupplies[ctxStore.id]||[];
  const low=sup.filter(i=>i.qty<=i.minQty);
  const existingItems=sup.map(i=>i.item);
  return `${showStorePicker?`<div class="field mb"><label>Viewing store</label><select onchange="setS({supStoreCtx:this.value})">${DB.stores.map(s=>`<option value="${s.id}"${s.id===ctxId?' selected':''}>${s.name}</option>`).join('')}</select></div>`:''}

  ${canEdit?`<div class="card"><div class="ct">Update supply</div>
    <div class="field"><label>Select item</label><select id="si-sel" onchange="prefillStoreSup(this.value,'${ctxStore.id}')">
      <option value="">-- Choose or add new --</option>
      ${existingItems.map(n=>`<option value="${n}">${n}</option>`).join('')}
      <option value="__new__">+ Add new item</option>
    </select></div>
    <div id="si-newname-wrap" style="display:none"><div class="field"><label>New item name</label><input type="text" id="si-newname" placeholder="e.g. Dry Fruits Toppings"/></div></div>

    <div class="field" style="margin-bottom:0"><label>Unit</label><select id="si-unit"><option>pcs</option><option>kg</option><option>g</option><option>ml</option><option>litres</option><option>rolls</option></select></div></div>
    <div class="field mt"><label>Min threshold</label><input type="number" id="si-min" placeholder="Min qty" min="0"/></div>
    <button class="bp bw" onclick="saveStoreSup('${ctxStore.id}')">Save Supply</button>
  </div>`:''}
  <div class="card"><div class="ct">Supplies — ${ctxStore.name}</div>
    ${sup.length===0?`<p class="tm" style="padding:1.5rem 0;text-align:center">No supplies recorded</p>`:''}
    ${sup.map(item=>{const isLow=item.qty<=item.minQty;const pct=Math.min(100,Math.round((item.qty/Math.max(item.minQty*2,item.qty))*100));return`<div style="padding:10px 0;border-bottom:1px solid var(--bd)">
      <div class="fbc mb"><div><span style="font-weight:700;font-size:13px">${item.item}</span>${isLow?`<span class="badge br2" style="margin-left:5px">Low</span>`:''}</div>
      <span style="font-family:var(--ff);font-size:1.1rem;color:${isLow?'#EF5350':'var(--pk)'}">${item.qty}<span style="font-size:.75rem"> ${item.unit}</span></span></div>
      <div class="prog"><div class="pf" style="width:${pct}%;background:${isLow?'#EF5350':pct>60?'var(--tl)':'var(--pk)'}"></div></div>
    </div>`;}).join('')}
  </div>`;
}

    <div class="sc tl"><div class="sv">${DB.events.filter(e=>e.status==='active').length}</div><div class="sl">Active</div></div>
    <div class="sc"><div class="sv">${DB.events.filter(e=>e.status==='completed').length}</div><div class="sl">Completed</div></div>
    <div class="sc"><div class="sv">${DB.events.reduce((s,e)=>s+e.gelato.reduce((a,g)=>a+(g.weight?(g.weight*(g.qty||1)):0),0),0).toFixed(0)}<span style="font-size:.9rem">kg</span></div><div class="sl">Allocated</div></div>
  </div>
  ${evs.length===0?`<div class="card"><p class="tm" style="padding:1.5rem 0;text-align:center">No events</p></div>`:''}

    <div class="fbc mb"><span style="font-weight:700;font-size:14px">${e.name}</span><span class="badge" style="background:${evC(e.status)};color:white">${e.status}</span></div>
    <div class="tm" style="font-size:12px;margin-bottom:6px">&#128197; ${fd(e.date)} &nbsp;&#128205; ${e.location} &nbsp;&#128101; ${e.client}${e.pax?` &nbsp;&#128101; ${e.pax} pax`:''}</div>
    <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px">
      ${e.gelato.map(g=>`<span style="padding:3px 8px;background:var(--pkll);border:1px solid var(--bd);border-radius:20px;font-size:11px;font-weight:600;color:var(--tx2)">${g.flavour.split(' ').slice(0,2).join(' ')} · ${g.qty||1}×${pL(g.pan)}${g.weight?' ('+(g.weight*(g.qty||1)).toFixed(1)+'kg)':''}</span>`).join('')}

      <span style="color:var(--am);font-size:12px;font-weight:700">${e.gelato.reduce((s,g)=>s+(g.weight?(g.weight*(g.qty||1)):0),0).toFixed(1)}kg &#8250;</span>
    </div>
  </div>`).join('')}`;
}

  <div class="evc evs-${ev.status}">
    <div class="fbc mb"><span style="font-weight:700;font-size:15px">${ev.name}</span><span class="badge" style="background:${evC(ev.status)};color:white">${ev.status}</span></div>
    <div class="tm mb">&#128197; ${fd(ev.date)} &nbsp; &#128205; ${ev.location} &nbsp; &#128101; ${ev.client}${ev.pax?` &nbsp; &#128101; <strong>${ev.pax} pax</strong>`:''}</div>

      <div class="fbc mb"><span style="font-weight:700;font-size:13px">${g.flavour}</span>
        <span style="font-family:var(--ff);font-size:1.05rem;color:var(--pk)">${g.weight?(g.weight*(g.qty||1)).toFixed(1)+'<span style="font-size:.75rem">kg</span>':'<span style="font-size:.8rem;color:var(--tx3)">TBD</span>'}</span></div>
      <div class="fbc" style="align-items:center;gap:6px;flex-wrap:wrap">
        <span class="${pC(g.pan)}">${pL(g.pan)}</span>

        <span class="badge" style="background:${g.storedAt==='lab'?'var(--pkll)':'var(--tlll)'};color:${g.storedAt==='lab'?'var(--pkdd)':'var(--tldd)'}">&#128197; ${g.storedAt==='lab'?'Lab':sN(g.storedAt)}</span>

    </div>`).join('')}

    <div class="field"><label>Flavour</label><select id="evg-fl"><option value="">Select</option>${DB.flavours.map(f=>`<option>${f.name}</option>`).join('')}</select></div>
    <div class="r2">
      <div class="field" style="margin-bottom:0"><label>Pan type</label><select id="evg-pan"><option value="full">Full Pan</option><option value="used">Used Pan</option></select></div>

/* 7-day week, 1 weekly off per week */
function getWorkingDaysInMonth(month){
  // Total calendar days minus the 4 fixed weekly offs
  const [yr,mo]=month.split('-').map(Number);
  return new Date(yr,mo,0).getDate()-4; // e.g. May=31-4=27 payable days max
}
function calcSalaryDetails(userId,month){
  const u=DB.users.find(u=>u.id===userId);
  if(!u)return{salary:0,effectiveDays:0,absentDays:0,bonusDays:0,deductDays:0,totalDeduct:0,fullDays:0,halfDays:0,allowedOffs:4,takenOffs:0,excessOffs:0,dayRate:0,payableDays:0};
  const att=DB.attendance.filter(a=>a.userId===userId&&a.status==='approved'&&a.date.startsWith(month));
  const offs=DB.weeklyOffs.filter(o=>o.userId===userId&&o.date.startsWith(month));
  const fullDays=att.filter(a=>shiftStatus(a.hours)==='complete').length;
  const halfDays=att.filter(a=>shiftStatus(a.hours)==='half').length;
  // 2 half-days = 1 full day
  const effectiveDays=fullDays+Math.floor(halfDays/2)+(halfDays%2===1?0.5:0);
  const allowedOffs=4; // fixed: 4 weekly offs per month
  const takenOffs=offs.length;
  const excessOffs=Math.max(0,takenOffs-allowedOffs);
  const unusedOffs=Math.max(0,allowedOffs-takenOffs); // unused offs = bonus day
  // Working days = calendar days - 4 allowed offs
  const calDays=new Date(parseInt(month.split('-')[0]),parseInt(month.split('-')[1]),0).getDate();
  const expectedWorkDays=calDays-allowedOffs; // days employee should have worked
  // Absent = expected work days - actual effective days worked - excess offs taken (already absent)
  const absentDays=Math.max(0,expectedWorkDays-effectiveDays-takenOffs+allowedOffs);
  const totalDeduct=excessOffs+absentDays; // total days to deduct
  const dayRate=u.type==='monthly'?u.salary/26:u.salary;
  let salary;
  if(u.type==='monthly'){
    // Monthly: base - deductions + unused off bonus
    salary=u.salary-(totalDeduct*dayRate)+(unusedOffs*dayRate);
  } else {
    // Daily: pay for effective days only (no base)
    salary=effectiveDays*dayRate-(excessOffs*dayRate);
  }
  const payableDays=u.type==='monthly'?null:effectiveDays;
  return{
    salary:Math.max(0,Math.round(salary)),effectiveDays,absentDays,bonusDays:unusedOffs,
    deductDays:totalDeduct,excessOffs,fullDays,halfDays,allowedOffs,takenOffs,dayRate,
    payableDays,calDays,expectedWorkDays
  };
}
function calcSalary(userId,month){return calcSalaryDetails(userId,month).salary;}

function markOff(){
  const d=document.getElementById('off-date')?.value;
  if(!d){showN('Select a date');return;}
  const u=S.user;const m=d.substring(0,7);
  if(DB.weeklyOffs.find(o=>o.userId===u.id&&o.date===d)){showN('Already marked off on this date');return;}
  DB.weeklyOffs.push({id:Date.now(),userId:u.id,date:d,name:u.name});
  const taken=DB.weeklyOffs.filter(o=>o.userId===u.id&&o.date.startsWith(m)).length;
  showN(taken>4?'Off marked ('+taken+'/4 — excess offs will be deducted)':'Weekly off marked for '+fd(d));re();
}

/* ---- Generic batch item helpers ---- */
function addBI(key,tmpl){S[key]=[...(S[key]||[]),{...tmpl}];re();}
function rmBI(key,i){const a=S[key]||[];a.splice(i,1);if(a.length===0)a.push({});S[key]=[...a];re();}
function upBI(key,i,f,v){if(S[key]&&S[key][i])S[key][i][f]=v;}

function onRawSel(i,val){S.rawItems[i].name=val;if(val&&val!=='__new__'){const ex=DB.labRaw.find(x=>x.name===val);if(ex){S.rawItems[i].qty=ex.qty;S.rawItems[i].unit=ex.unit;S.rawItems[i].minQty=ex.minQty;}}re();}
function onLabSupSel(i,val){S.labSupItems[i].item=val;if(val&&val!=='__new__'){const ex=DB.labSupplies.find(x=>x.item===val);if(ex){S.labSupItems[i].qty=ex.qty;S.labSupItems[i].unit=ex.unit;S.labSupItems[i].minQty=ex.minQty;}}re();}
function onStoreSupSel(i,val,storeId){S.storeSupItems[i].item=val;if(val&&val!=='__new__'){const ex=(DB.storeSupplies[storeId]||[]).find(x=>x.item===val);if(ex){S.storeSupItems[i].qty=ex.qty;S.storeSupItems[i].unit=ex.unit;S.storeSupItems[i].minQty=ex.minQty;}}re();}

function submitLabGelato(){
  const items=S.labGItems||[];let ok=0;
  items.forEach(item=>{
    if(!item.flavour||!item.qty)return;
    const wt=item.weight?parseFloat(item.weight):null;
    if(wt!==null&&item.pan==='full'&&wt>3.5){showN('Full pan max 3.5kg: '+item.flavour);return;}
    DB.labGelato.push({id:Date.now()+ok,flavour:item.flavour,batchDate:item.batchDate||todayStr(),pan:item.pan||'full',qty:item.qty||1,weight:wt,available:wt});
    ok++;
  });
  if(ok===0){showN('Select at least one flavour');return;}
  S.labGItems=[{flavour:'',pan:'full',qty:1,weight:'',batchDate:todayStr()}];
  showN(ok+' batch'+(ok!==1?'es':'')+' added');re();
}

function submitRawMaterials(){
  const items=S.rawItems||[];let ok=0;const today=todayStr();
  items.forEach(item=>{
    const name=item.name==='__new__'?item.newName?.trim():item.name;
    const qty=parseFloat(item.qty);if(!name||isNaN(qty)||qty<0)return;
    const min=item.minQty?parseFloat(item.minQty):0;
    const ex=DB.labRaw.find(i=>i.name.toLowerCase()===name.toLowerCase());
    if(ex){ex.qty=qty;if(!isNaN(min))ex.minQty=min;ex.lastUpdated=today;}
    else DB.labRaw.push({id:Date.now()+ok,name,unit:item.unit||'kg',qty,minQty:isNaN(min)?0:min,lastUpdated:today});
    ok++;
  });
  if(ok===0){showN('Fill at least one material with quantity');return;}
  S.rawItems=[{name:'',qty:'',unit:'kg',minQty:''}];
  showN(ok+' material'+(ok!==1?'s':'')+' saved');re();
}

function submitLabSup(){
  const items=S.labSupItems||[];let ok=0;
  items.forEach(item=>{
    const name=item.item==='__new__'?item.newName?.trim():item.item;
    const qty=parseFloat(item.qty);if(!name||isNaN(qty)||qty<0)return;
    const min=item.minQty?parseFloat(item.minQty):0;
    const ex=DB.labSupplies.find(i=>i.item.toLowerCase()===name.toLowerCase());
    if(ex){ex.qty=qty;if(!isNaN(min))ex.minQty=min;if(item.unit)ex.unit=item.unit;}
    else DB.labSupplies.push({id:Date.now()+ok,item:name,unit:item.unit||'pcs',qty,minQty:isNaN(min)?0:min});
    ok++;
  });
  if(ok===0){showN('Fill at least one item with quantity');return;}
  S.labSupItems=[{item:'',qty:'',unit:'pcs',minQty:''}];
  showN(ok+' lab supply item'+(ok!==1?'s':'')+' saved');re();
}

function submitStoreSup(storeId){
  const items=S.storeSupItems||[];let ok=0;
  items.forEach(item=>{
    const name=item.item==='__new__'?item.newName?.trim():item.item;
    const qty=parseFloat(item.qty);if(!name||isNaN(qty)||qty<0)return;
    const min=item.minQty?parseFloat(item.minQty):0;
    if(!DB.storeSupplies[storeId])DB.storeSupplies[storeId]=[];
    const ex=DB.storeSupplies[storeId].find(i=>i.item.toLowerCase()===name.toLowerCase());
    if(ex){ex.qty=qty;if(!isNaN(min))ex.minQty=min;if(item.unit)ex.unit=item.unit;}
    else DB.storeSupplies[storeId].push({id:Date.now()+ok,item:name,unit:item.unit||'pcs',qty,minQty:isNaN(min)?0:min});
    ok++;
  });
  if(ok===0){showN('Fill at least one item with quantity');return;}
  S.storeSupItems=[{item:'',qty:'',unit:'pcs',minQty:''}];
  showN(ok+' supply item'+(ok!==1?'s':'')+' saved at '+sN(storeId));re();
}

function submitFlavours(){
  const items=S.flavItems||[];let ok=0;
  items.forEach(item=>{
    const name=item.name?.trim();if(!name)return;
    if(DB.flavours.find(f=>f.name.toLowerCase()===name.toLowerCase()))return;
    DB.flavours.push({name,seasonal:item.seasonal||false,sorbet:item.sorbet||false});ok++;
  });
  if(ok===0){showN('Enter at least one new flavour name');return;}
  S.flavItems=[{name:'',seasonal:false,sorbet:false}];
  showN(ok+' flavour'+(ok!==1?'s':'')+' added');re();
}

function submitDispatch(){
  const items=S.dispatchItems||[];const storeEl=document.getElementById('dp-store');const st=storeEl?.value;const notes=document.getElementById('dp-notes')?.value||'';
  if(!st){showN('Select a store');return;}let ok=0;
  items.forEach(item=>{
    if(!item.flavour)return;
    const fl=item.flavour.replace(/\s*\(.*\)$/,'');
    const labItem=DB.labGelato.find(i=>i.flavour===fl);
    const wt=item.weight?parseFloat(item.weight):null;
    if(labItem&&wt&&wt>labItem.available){showN('Insufficient stock: '+fl);return;}
    if(labItem&&wt)labItem.available=parseFloat((labItem.available-wt).toFixed(2));
    const dId=Date.now()+ok;
    const panRole=item.panRole||'store';
    DB.dispatches.push({id:dId,flavour:fl,pan:item.pan,panRole,qty:item.qty||1,weight:wt,toStore:st,date:todayStr(),notes,loggedBy:S.user.name,status:'pending'});
    DB.pendingDispatch.push({id:dId,flavour:fl,pan:item.pan,panRole,qty:item.qty||1,weight:wt,toStore:st,date:todayStr(),notes,loggedBy:S.user.name});
    ok++;
  });
  if(ok===0){showN('Select at least one flavour');return;}
  S.dispatchItems=[{flavour:'',pan:'full',qty:1,weight:''}];
  showN(ok+' dispatch'+(ok!==1?'es':'')+' logged → '+sN(st));re();
}

function submitReceived(storeId){
  const items=S.receivedItems||[];const notes=document.getElementById('rc-notes')?.value||'';let ok=0;
  items.forEach(item=>{
    if(!item.flavour)return;
    const wt=item.weight?parseFloat(item.weight):null;
    if(!DB.storeReceived[storeId])DB.storeReceived[storeId]=[];
    DB.storeReceived[storeId].push({id:Date.now()+ok,flavour:item.flavour,pan:item.pan,qty:item.qty||1,weight:wt,date:todayStr(),notes});
    ok++;
  });
  if(ok===0){showN('Select at least one flavour');return;}
  S.receivedItems=[{flavour:'',pan:'full',qty:1,weight:''}];
  showN(ok+' receipt'+(ok!==1?'s':'')+' logged at '+sN(storeId));re();
}

function addFlavour(){showN('Use the Flavours tab batch form');}
function rmFlavour(i){if(S.user.role!=='admin'){showN('Only admin can remove flavours');return;}DB.flavours.splice(i,1);showN('Flavour removed');re();}
function addStoreG(sid){const fl=document.getElementById('sg-fl')?.value;const pan=document.getElementById('sg-pan')?.value;const role=document.getElementById('sg-role')?.value||'display';const wt=parseFloat(document.getElementById('sg-wt')?.value);const dt=document.getElementById('sg-dt')?.value;if(!fl||!dt||isNaN(wt)||wt<=0){showN('Fill all fields');return;}if(pan==='full'&&wt>3.5){showN('Full pan max 3.5kg');return;}if(!DB.storeGelato[sid])DB.storeGelato[sid]=[];DB.storeGelato[sid].push({id:Date.now(),flavour:fl,mfgDate:dt,pan,panRole:role,weight:wt});showN('Added: '+fl+' ('+role+')');re();}
function submitAllReqs(){const items=S.reqItems||[];const storeEl=document.getElementById('rq-st');const sid=storeEl?.value;const sn=DB.stores.find(s=>s.id===sid)?.name||sid;let ok=0;items.forEach(item=>{if(!item.flavour)return;DB.requirements.push({id:Date.now()+ok,store:sn,flavour:item.flavour,qty:item.qty||1,pan:item.pan||'full',date:todayStr(),status:'pending',employee:S.user.name});ok++;});if(ok===0){showN('Please select flavours for all items');return;}S.reqItems=[{flavour:'',pan:'full',qty:1}];showN(ok+' request'+(ok!==1?'s':'')+' submitted for '+sn);sst('reqs','view');}

function addEvent(){const name=document.getElementById('ev-name')?.value?.trim();const client=document.getElementById('ev-client')?.value?.trim();const date=document.getElementById('ev-date')?.value;const loc=document.getElementById('ev-loc')?.value?.trim()||'';const notes=document.getElementById('ev-notes')?.value?.trim()||'';const paxRaw=document.getElementById('ev-pax')?.value;const pax=paxRaw?parseInt(paxRaw):null;if(!name||!client||!date){showN('Fill event name, client and date');return;}const ev={id:Date.now(),name,client,date,location:loc,status:'upcoming',notes,pax,gelato:[],consumed:[]};DB.events.push(ev);S.evSelId=ev.id;showN('Event created: '+name);sst('events','detail');}
function addEvG(evId){const ev=DB.events.find(e=>e.id===evId);if(!ev)return;const fl=document.getElementById('evg-fl')?.value;const pan=document.getElementById('evg-pan')?.value;const qty=parseInt(document.getElementById('evg-qty')?.value)||1;const wtRaw=document.getElementById('evg-wt')?.value;const wt=wtRaw&&wtRaw.trim()!==''?parseFloat(wtRaw):null;const loc=document.getElementById('evg-loc')?.value;if(!fl){showN('Select a flavour');return;}ev.gelato.push({flavour:fl,pan,qty,weight:wt,storedAt:loc});showN('Gelato added to event');re();}
function addEvConsumed(evId){const ev=DB.events.find(e=>e.id===evId);if(!ev)return;const fl=document.getElementById('evc-fl')?.value;const pan=document.getElementById('evc-pan')?.value;const qty=parseInt(document.getElementById('evc-qty')?.value)||1;const wtRaw=document.getElementById('evc-wt')?.value;const wt=wtRaw&&wtRaw.trim()!==''?parseFloat(wtRaw):null;const notes=document.getElementById('evc-notes')?.value||'';if(!fl){showN('Select a flavour');return;}ev.consumed.push({flavour:fl,pan,qty,weight:wt,notes});showN('Consumed entry logged');re();}
function setEvSt(evId,status){const ev=DB.events.find(e=>e.id===evId);if(ev){ev.status=status;showN('Event marked as '+status);re();}}

function deactivateUser(id){const u=DB.users.find(u=>u.id===id);if(u){u.active=false;showN(u.name+' removed from active team');re();}}
function addUser(){const name=document.getElementById('nu-n')?.value?.trim();const phone=document.getElementById('nu-p')?.value?.trim();const pass=document.getElementById('nu-pw')?.value?.trim();const role=document.getElementById('nu-r')?.value;const store=document.getElementById('nu-st')?.value||null;const sal=parseFloat(document.getElementById('nu-s')?.value)||0;const type=document.getElementById('nu-t')?.value||'monthly';if(!name||!phone||phone.length!==10||!pass){showN('Fill name, 10-digit mobile and password');return;}if(DB.users.find(u=>u.phone===phone)){showN('Mobile number already registered');return;}DB.users.push({id:Date.now(),name,role,phone,pass,store,salary:sal,type,active:true});S.modal=null;S.addUserRole='store_staff';showN('Added: '+name);re();}

function rStorePending(store,canEdit){
  const pending=(DB.pendingDispatch||[]).filter(d=>d.toStore===store.id);
  if(pending.length===0)return `<div class="card"><div class="ct">Incoming dispatches</div><div class="al as">No pending dispatches for ${store.name}</div></div>`;
  return `<div class="card"><div class="ct">Incoming dispatches — accept to add to inventory</div>
    ${pending.map(d=>`<div class="drow" style="margin-bottom:8px">
      <div class="fbc mb"><span style="font-weight:700;font-size:13px">${d.flavour}</span>
        <div style="text-align:right">
          <span style="font-family:var(--ff);font-size:1rem;color:var(--tld)">${d.qty||1}<span style="font-size:.75rem"> pan${(d.qty||1)!==1?'s':''}</span></span>
          ${d.weight?`<span style="font-family:var(--ff);font-size:.85rem;color:var(--tx3)"> · ${d.weight.toFixed(1)}kg</span>`:''}
        </div></div>
      <div class="fbc mb" style="gap:5px">
        <span class="${pC(d.pan)}">${pL(d.pan)}</span>
        <span class="tm" style="font-size:11px">From lab · ${fd(d.date)} · by ${d.loggedBy||'Lab'}</span>
      </div>
      ${d.notes?`<div class="tm" style="font-size:11px;margin-bottom:6px">&#128196; ${d.notes}</div>`:''}
      ${canEdit?`<div style="display:flex;gap:6px">
        <button class="bt" onclick="acceptDispatch(${d.id},'${store.id}')">&#10003; Accept</button>
        <button class="bd2c" onclick="rejectDispatch(${d.id})">Reject</button>
      </div>`:''}
    </div>`).join('')}
  </div>`;
}

function acceptDispatch(dispId,storeId){
  const d=(DB.pendingDispatch||[]).find(p=>p.id===dispId);
  if(!d)return;
  const storePanRole=d.panRole==='event'?'event':'backup';
  if(!DB.storeGelato[storeId])DB.storeGelato[storeId]=[];
  DB.storeGelato[storeId].push({id:Date.now(),flavour:d.flavour,mfgDate:d.mfgDate||todayStr(),pan:d.pan,panRole:storePanRole,qty:d.qty||1,weight:d.weight||0});
  if(!DB.storeReceived[storeId])DB.storeReceived[storeId]=[];
  DB.storeReceived[storeId].push({id:Date.now()+1,flavour:d.flavour,pan:d.pan,panRole:storePanRole,qty:d.qty||1,weight:d.weight,mfgDate:d.mfgDate||todayStr(),date:todayStr(),notes:d.notes||''});
  const disp=DB.dispatches.find(dp=>dp.id===dispId);if(disp)disp.status='accepted';
  DB.pendingDispatch.splice(DB.pendingDispatch.findIndex(p=>p.id===dispId),1);
  showN('Dispatch accepted — added to '+sN(storeId)+' inventory');re();
}

function rejectDispatch(dispId){
  const idx=(DB.pendingDispatch||[]).findIndex(p=>p.id===dispId);
  if(idx>=0)DB.pendingDispatch.splice(idx,1);
  const disp=DB.dispatches.find(dp=>dp.id===dispId);if(disp)disp.status='rejected';
  showN('Dispatch rejected');re();
}

function showN(msg){S.notif=msg;re();setTimeout(()=>{S.notif=null;re();},3000);}

async function askAI(q){
  S.aiLoading=true;S.aiResp=null;re();
  const ctx=`You are the operations AI for Snowy Owl Gelato Co., premium gelato, Dehradun. Pan types: Full Pan=max 3.5kg, Used Pan=variable. Lab gelato: ${JSON.stringify(DB.labGelato.map(i=>({f:i.flavour,pan:pL(i.pan),avail:i.available.toFixed(1)+'kg',age:daysOld(i.batchDate)+'d'})))}. Active events: ${JSON.stringify(DB.events.filter(e=>e.status==='active'||e.status==='upcoming').map(e=>({name:e.name,pax:e.pax,gelato:e.gelato.map(g=>g.flavour+' '+((g.qty||1))+'x'+pL(g.pan))})))}. Pending reqs: ${JSON.stringify(DB.requirements.filter(r=>r.status==='pending'))}. Give 4-5 specific actionable bullet points. Use ✦. Be concise.`;
  try{const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:500,system:ctx,messages:[{role:'user',content:q}]})});const data=await res.json();S.aiResp=(data.content?.[0]?.text||'No response').replace(/\n/g,'<br>');}catch(e){S.aiResp='AI temporarily unavailable.';}
  S.aiLoading=false;re();
}
function askAICustom(){const i=document.getElementById('ai-inp');if(i?.value?.trim())askAI(i.value.trim());}

re();
